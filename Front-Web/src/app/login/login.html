<section class = "login">
  <app-notification></app-notification>
  <div class="header">
    <img src="monitex_cropped_r.png">
  </div>
  <div class="login-card">
      <div class = "login-image">
    <img src ="smart_home3.png">
  </div>

    <div class="login-form">
      <h2>Welcome Back</h2>

      <div class="input-group">
        <input type="email" placeholder=" " required [(ngModel)]="email">
        <label>Email</label>
      </div>

      <div class="input-group">
        <input type="password" placeholder=" " required [(ngModel)]="password">
        <label>Password</label>
      </div>
      <div class="options">
        <label>
          <input type="checkbox" class ="">
          <span class="checkmark"><i class="fa-utility-duo fa-s`emibold fa-circle-check"></i></span>
          Remember Me
        </label>
        <a href="#">Forget Password?</a>
      </div>
      <button class = "login-btn" (click)="login()">Login</button>
      <app-divider [message]="'OR Login With'"></app-divider>
      <div class="social-login">
        <button class="social-btn google">
          <i class="fab fa-google"></i>
        </button>

        <button class="social-btn github">
          <i class="fab fa-github"></i>
        </button>
        <button class="social-btn microsoft">
          <i class="fab fa-microsoft">
          </i>
        </button>
      </div>
      <div class="register-link">
        <span>Don't have an account?</span>
        <a href="#">Register</a>
      </div>

    </div>
  </div>
</section>
