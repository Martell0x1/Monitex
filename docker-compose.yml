services:
  postgres:
    image: postgres:16-alpine
    container_name: monitex-postgres
    restart: unless-stopped
    environment:
      POSTGRES_DB: monitex
      POSTGRES_USER: dbt5user
      POSTGRES_PASSWORD: maro
    ports:
      - "5432:5432"
    volumes:
      - postgres-data:/var/lib/postgresql/data
      - ./postgres-init:/docker-entrypoint-initdb.d
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U dbt5user -d monitex"]
      interval: 10s
      timeout: 5s
      retries: 10

  influxdb:
    image: influxdb:2.7-alpine
    container_name: monitex-influxdb
    restart: unless-stopped
    environment:
      DOCKER_INFLUXDB_INIT_MODE: setup
      DOCKER_INFLUXDB_INIT_USERNAME: admin
      DOCKER_INFLUXDB_INIT_PASSWORD: monitex-admin
      DOCKER_INFLUXDB_INIT_ORG: monitex-org
      DOCKER_INFLUXDB_INIT_BUCKET: monitex
      DOCKER_INFLUXDB_INIT_ADMIN_TOKEN: E_0cWP_5aLZ6KQKK7y6rPVXvoI1DRF6bf0xVjMrw2JwUCu6McyG4mQe6y629aHh6Q9jNnalYkqq_HTzxDWU7nA==
    ports:
      - "8086:8086"
    volumes:
      - influxdb-data:/var/lib/influxdb2
    healthcheck:
      test: ["CMD", "influx", "ping"]
      interval: 10s
      timeout: 5s
      retries: 10

  rabbitmq:
    image: rabbitmq:3-management-alpine
    container_name: monitex-rabbitmq
    restart: unless-stopped
    environment:
      RABBITMQ_DEFAULT_USER: monitex
      RABBITMQ_DEFAULT_PASS: Maro
    ports:
      - "5672:5672"
      - "15672:15672"
    volumes:
      - rabbitmq-data:/var/lib/rabbitmq
    healthcheck:
      test: ["CMD", "rabbitmq-diagnostics", "check_running"]
      interval: 10s
      timeout: 5s
      retries: 10

  mosquitto:
    image: eclipse-mosquitto:2
    container_name: monitex-mosquitto
    restart: unless-stopped
    ports:
      - "1883:1883"
    volumes:
      - ./mosquitto/mosquitto.conf:/mosquitto/config/mosquitto.conf:ro
      - mosquitto-data:/mosquitto/data
      - mosquitto-log:/mosquitto/log
    healthcheck:
      test: ["CMD-SHELL", "mosquitto_sub -h localhost -p 1883 -t '$$SYS/broker/version' -C 1 -W 3 >/dev/null 2>&1 || exit 1"]
      interval: 15s
      timeout: 5s
      retries: 10
    extra_hosts:
      - "mqtt-broker:host-gateway"

  backend:
    build:
      context: ./Backend
      dockerfile: Dockerfile
    container_name: monitex-backend
    restart: unless-stopped
    depends_on:
      postgres:
        condition: service_healthy
      influxdb:
        condition: service_healthy
      rabbitmq:
        condition: service_healthy
      mosquitto:
        condition: service_healthy
    extra_hosts:
      - "mqtt-broker:host-gateway"
    environment:
      ASPNETCORE_ENVIRONMENT: Development
      ConnectionStrings__Postgres: Host=postgres;Port=5432;Database=monitex;Username=dbt5user;Password=maro;
      MQTT__Ip: mosquitto
      MQTT__Port: 1883
      MQTT__Topic: test/topic
      RabbitMq__Url: amqp://monitex:Maro@rabbitmq:5672/
      RabbitMq__Exchange: iot.sensors.exchange
      RabbitMq__DashboardQueue: iot.sensors.dashboard.queue
      RabbitMq__InfluxQueue: iot.sensors.influx.queue
      RabbitMq__PythonModelQueue: iot.sensors.anomaly.queue
      RabbitMq__PythonResultsQueue: iot.sensors.anomaly.results.queue
      RabbitMq__DashboardRoutingKey: sensor.dashboard
      RabbitMq__InfluxRoutingKey: sensor.influx
      RabbitMq__PythonModelRoutingKey: sensor.anomaly
      RabbitMq__PythonResultsRoutingKey: sensor.anomaly.detected
      InfluxPipeline__Queue: iot.sensors.influx.queue
      InfluxDB__Url: http://influxdb:8086
      InfluxDB__Bucket: monitex
      InfluxDB__Org: monitex-org
      InfluxDB__Token: E_0cWP_5aLZ6KQKK7y6rPVXvoI1DRF6bf0xVjMrw2JwUCu6McyG4mQe6y629aHh6Q9jNnalYkqq_HTzxDWU7nA==
    ports:
      - "5020:5020"

  monitex-ai:
    build:
      context: ./monitex-ai
      dockerfile: Dockerfile
    container_name: monitex-ai
    restart: unless-stopped
    depends_on:
      rabbitmq:
        condition: service_healthy
      backend:
        condition: service_started
    environment:
      RABBITMQ_URL: amqp://monitex:Maro@rabbitmq:5672/
      RABBITMQ_QUEUE_NAME: iot.sensors.anomaly.queue
      RABBITMQ_EXCHANGE_NAME: iot.sensors.exchange
      ANOMALY_RESULTS_ROUTING_KEY: sensor.anomaly.detected
      ANOMALY_MODEL_PATH: /app/esp32_anomaly_model.joblib

  frontend:
    build:
      context: ./Front-Web
      dockerfile: Dockerfile
    container_name: monitex-frontend
    restart: unless-stopped
    depends_on:
      backend:
        condition: service_started
    ports:
      - "4200:4200"
  nginx:
    image: nginx:alpine
    container_name: monitex-nginx
    restart: unless-stopped
    ports:
      - "80:80"
    volumes:
      - ./nginx/nginx.conf:/etc/nginx/nginx.conf:ro
    depends_on:
      - frontend
      - backend
      - rabbitmq
      - influxdb
volumes:
  postgres-data:
  influxdb-data:
  rabbitmq-data:
  mosquitto-data:
  mosquitto-log:
