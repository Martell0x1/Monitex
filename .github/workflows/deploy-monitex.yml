name: Deploy Angular Static Site

on:
  push:
    branches:
      - main
    paths:
      - "monitex.io/Monitex-Front-End/**"

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: false

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repo
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: Install dependencies
        run: |
          cd Monitex-frontend
          npm install

      - name: Build Angular app
        run: |
          cd Monitex-frontend
          npm run build -- --configuration production --base-href "/monitex.io/"

      - name: Upload artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: Monitex-frontend/dist

  deploy:
    needs: build
    runs-on: ubuntu-latest

    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}

    steps:
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
