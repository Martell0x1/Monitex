events {}

http {

    server {
        listen 80;
        server_name monitex.local;
        proxy_http_version 1.1;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection "upgrade";
        proxy_set_header Host $host;

        location /api/ {
            proxy_pass http://backend:5020/api/;
        }

        location /sensorHub/ {
          proxy_pass http://backend:5020/sensorHub/;
        }

        location / {
            proxy_pass http://frontend:4200;
        }
    }

    server {
        listen 80;
        server_name backend.local;

        location / {
            proxy_pass http://backend:5020;
        }
    }

    server {
        listen 80;
        server_name rabbitmq.local;

        location / {
            proxy_pass http://rabbitmq:15672;
        }
    }

    server {
        listen 80;
        server_name influx.local;

        location / {
            proxy_pass http://influxdb:8086;
        }
    }

}
